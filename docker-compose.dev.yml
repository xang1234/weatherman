# Local development stack for Weatherman
#
# Starts TiTiler for serving weather COG tiles.
# COGs are read from the local .data/ directory (mounted as /data/).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#
# Prerequisites:
#   uv run python scripts/run_pipeline.py   # generates COGs into .data/
#
# Then start the API and frontend:
#   WEATHERMAN_DATA_DIR=.data TITILER_COG_ROOT=/data uv run python -m weatherman
#   cd frontend && npx vite dev

services:
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.5
    container_name: weatherman-titiler-dev
    ports:
      - "8080:8080"
    volumes:
      - ./.data:/data:ro
    environment:
      # CORS — allow frontend dev server
      TITILER_API_CORS_ORIGINS: "*"

      # Minimal workers for dev
      WEB_CONCURRENCY: "2"

      # GDAL tuning for local file access
      GDAL_CACHEMAX: "200"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped
