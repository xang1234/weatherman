apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion-service
  labels:
    {{- include "weatherman.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-service
spec:
  replicas: {{ .Values.ingestionService.replicaCount }}
  selector:
    matchLabels:
      {{- include "weatherman.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" "ingestion-service") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "weatherman.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" "ingestion-service") | nindent 8 }}
    spec:
      containers:
        - name: ingestion-service
          image: "{{ .Values.ingestionService.image.repository | default .Values.global.image.repository }}:{{ .Values.ingestionService.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ingestionService.port }}
              protocol: TCP
          livenessProbe:
            {{- include "weatherman.probe" (dict "probe" .Values.ingestionService.probes.liveness) | nindent 12 }}
          readinessProbe:
            {{- include "weatherman.probe" (dict "probe" .Values.ingestionService.probes.readiness) | nindent 12 }}
          startupProbe:
            {{- include "weatherman.probe" (dict "probe" .Values.ingestionService.probes.startup) | nindent 12 }}
          resources:
            {{- toYaml .Values.ingestionService.resources | nindent 12 }}
