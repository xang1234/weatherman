server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Backend API routes
    location /api/    { proxy_pass http://backend:8000; }
    location /tiles/  { proxy_pass http://backend:8000; }
    location /v1/     { proxy_pass http://backend:8000; }
    location /ais/    { proxy_pass http://backend:8000; }
    location /health/ { proxy_pass http://backend:8000; }
    location /metrics { proxy_pass http://backend:8000; }

    # SSE — disable buffering, long timeout
    location /events/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # TiTiler (browser fetches tile URLs from TileJSON)
    location /cog/ { proxy_pass http://titiler:80; }

    # SPA fallback
    location / { try_files $uri $uri/ /index.html; }
}
