# TiTiler tile server for Weatherman
#
# Usage:
#   docker compose -f docker-compose.titiler.yml up -d
#
# Required environment variables (pass via .env or shell):
#   AWS_ACCESS_KEY_ID      - S3 credentials
#   AWS_SECRET_ACCESS_KEY  - S3 credentials
#
# Optional overrides:
#   TITILER_S3_ENDPOINT    - Custom S3 endpoint (for MinIO, etc.)
#   TITILER_WORKERS        - Number of uvicorn workers (default: 4)
#   TITILER_PORT           - Host port (default: 8080)

services:
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.5
    container_name: weatherman-titiler
    ports:
      - "${TITILER_PORT:-8080}:8080"
    environment:
      # S3 access
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_S3_ENDPOINT: "${TITILER_S3_ENDPOINT:-}"
      # For non-AWS S3 (MinIO, etc.), uncomment to force path-style access:
      # AWS_VIRTUAL_HOSTING: "FALSE"

      # CORS — allow frontend dev server and production origins
      TITILER_API_CORS_ORIGINS: "*"

      # Worker tuning
      WEB_CONCURRENCY: "${TITILER_WORKERS:-4}"
      WORKERS_PER_CORE: "1"
      GRACEFUL_TIMEOUT: "60"
      TIMEOUT: "60"

      # GDAL performance tuning for cloud-hosted COGs
      GDAL_CACHEMAX: "200"
      GDAL_BAND_BLOCK_CACHE: "HASHSET"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
      GDAL_HTTP_MULTIPLEX: "YES"
      GDAL_HTTP_VERSION: "2"
      CPL_VSIL_CURL_CACHE_SIZE: "209715200"  # 200 MB
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "209715200"  # 200 MB

    deploy:
      resources:
        limits:
          memory: 2304M
        reservations:
          memory: 1152M

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    restart: unless-stopped
