services:
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.5
    volumes:
      - ./.data:/data:ro
    environment:
      TITILER_API_CORS_ORIGINS: "*"
      WEB_CONCURRENCY: "2"
      GDAL_CACHEMAX: "200"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pipeline:
    build: .
    command: ["uv", "run", "python", "scripts/run_pipeline.py", "--data-dir", "/data", "--hours", "0,3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48"]
    volumes:
      - ./.data:/data

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./.data:/data:ro
    environment:
      WEATHERMAN_DATA_DIR: /data
      TITILER_COG_ROOT: /data
      TITILER_BASE_URL: http://titiler:80
      TITILER_PUBLIC_URL: ""
      AIS_DB_PATH: /data/ais.duckdb
      CORS_ORIGINS: "*"
    depends_on:
      titiler:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
