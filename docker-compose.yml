services:
  titiler:
    image: ghcr.io/developmentseed/titiler:0.18.5
    platform: linux/amd64
    volumes:
      - ./.data:/data:ro
    environment:
      TITILER_API_CORS_ORIGINS: "*"
      WEB_CONCURRENCY: "2"
      GDAL_CACHEMAX: "200"
      GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  pipeline:
    build: .
    command: ["uv", "run", "python", "scripts/run_pipeline.py", "--data-dir", "/data", "--hours", "0,3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48", "--max-runs", "2"]
    volumes:
      - ./.data:/data

  pipeline-gefs:
    build: .
    command: ["uv", "run", "python", "scripts/run_pipeline.py", "--model", "gefs", "--data-dir", "/data", "--hours", "0,3,6,9,12,15,18,21,24,27,30,33,36,39,42,45,48", "--max-runs", "2"]
    volumes:
      - ./.data:/data

  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./.data:/data:ro
    environment:
      WEATHERMAN_DATA_DIR: /data
      TITILER_COG_ROOT: /data
      TITILER_BASE_URL: http://titiler:80
      TITILER_PUBLIC_URL: ""
      AIS_DB_PATH: ${AIS_DB_PATH:-/data/ais.duckdb}
      AIS_BACKEND: ${AIS_BACKEND:-legacy_parquet}
      AIS_TENANT_ID: ${AIS_TENANT_ID:-default}
      NEPTUNE_STORE_ROOT: ${NEPTUNE_STORE_ROOT:-/data/neptune}
      NEPTUNE_SOURCES: ${NEPTUNE_SOURCES:-noaa}
      NEPTUNE_MERGE: ${NEPTUNE_MERGE:-best}
      NEPTUNE_BBOX: ${NEPTUNE_BBOX:-}
      NEPTUNE_MMSI: ${NEPTUNE_MMSI:-}
      NEPTUNE_RAW_POLICY: ${NEPTUNE_RAW_POLICY:-metadata}
      NEPTUNE_OVERWRITE: ${NEPTUNE_OVERWRITE:-false}
      NEPTUNE_API_KEYS_JSON: ${NEPTUNE_API_KEYS_JSON:-}
      NEPTUNE_LIVE_SOURCE: ${NEPTUNE_LIVE_SOURCE:-aisstream}
      NEPTUNE_LIVE_LANDING_DIR: ${NEPTUNE_LIVE_LANDING_DIR:-/data/neptune-live}
      NEPTUNE_LIVE_BBOX: ${NEPTUNE_LIVE_BBOX:-}
      NEPTUNE_LIVE_MMSI: ${NEPTUNE_LIVE_MMSI:-}
      NEPTUNE_LIVE_MAX_MESSAGES: ${NEPTUNE_LIVE_MAX_MESSAGES:-}
      NEPTUNE_LIVE_CLEANUP: ${NEPTUNE_LIVE_CLEANUP:-false}
      NEPTUNE_LIVE_FLUSH_INTERVAL: ${NEPTUNE_LIVE_FLUSH_INTERVAL:-60}
      NEPTUNE_LIVE_API_KEY: ${NEPTUNE_LIVE_API_KEY:-}
      CORS_ORIGINS: "*"
    depends_on:
      titiler:
        condition: service_healthy
      pipeline:
        condition: service_completed_successfully
      pipeline-gefs:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ais-neptune-live:
    profiles: ["ais-live"]
    build: .
    command: ["uv", "run", "python", "scripts/stream_ais_neptune.py"]
    volumes:
      - ./.data:/data
    environment:
      AIS_DB_PATH: ${AIS_DB_PATH:-/data/ais.duckdb}
      AIS_TENANT_ID: ${AIS_TENANT_ID:-default}
      NEPTUNE_STORE_ROOT: ${NEPTUNE_STORE_ROOT:-/data/neptune}
      NEPTUNE_SOURCES: ${NEPTUNE_SOURCES:-noaa}
      NEPTUNE_MERGE: ${NEPTUNE_MERGE:-best}
      NEPTUNE_BBOX: ${NEPTUNE_BBOX:-}
      NEPTUNE_MMSI: ${NEPTUNE_MMSI:-}
      NEPTUNE_RAW_POLICY: ${NEPTUNE_RAW_POLICY:-metadata}
      NEPTUNE_OVERWRITE: ${NEPTUNE_OVERWRITE:-false}
      NEPTUNE_API_KEYS_JSON: ${NEPTUNE_API_KEYS_JSON:-}
      NEPTUNE_LIVE_SOURCE: ${NEPTUNE_LIVE_SOURCE:-aisstream}
      NEPTUNE_LIVE_LANDING_DIR: ${NEPTUNE_LIVE_LANDING_DIR:-/data/neptune-live}
      NEPTUNE_LIVE_BBOX: ${NEPTUNE_LIVE_BBOX:-}
      NEPTUNE_LIVE_MMSI: ${NEPTUNE_LIVE_MMSI:-}
      NEPTUNE_LIVE_MAX_MESSAGES: ${NEPTUNE_LIVE_MAX_MESSAGES:-}
      NEPTUNE_LIVE_CLEANUP: ${NEPTUNE_LIVE_CLEANUP:-false}
      NEPTUNE_LIVE_FLUSH_INTERVAL: ${NEPTUNE_LIVE_FLUSH_INTERVAL:-60}
      NEPTUNE_LIVE_API_KEY: ${NEPTUNE_LIVE_API_KEY:-}

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
