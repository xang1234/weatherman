# Layer definitions for the weatherman platform.
#
# Adding a new weather layer requires ONLY a new entry here.
# No code changes needed (design principle #5).
#
# Structure:
#   variables: Source data extracted from GRIB2 into Zarr
#   layers:    Display layers rendered as COG tiles on the map
#
# Most layers map 1:1 to a variable, but derived layers (e.g. wind_speed)
# combine multiple source variables via a computation method.

variables:
  tmp_2m:
    long_name: "Temperature at 2m above ground"
    units: "K"
    grib2_key: ":TMP:2 m above ground:"
    level: "2 m above ground"

  ugrd_10m:
    long_name: "U-component of wind at 10m above ground"
    units: "m/s"
    grib2_key: ":UGRD:10 m above ground:"
    level: "10 m above ground"

  vgrd_10m:
    long_name: "V-component of wind at 10m above ground"
    units: "m/s"
    grib2_key: ":VGRD:10 m above ground:"
    level: "10 m above ground"

  apcp_sfc:
    long_name: "Total precipitation"
    units: "kg/m^2"
    grib2_key: ":APCP:surface:"
    level: "surface"

  prmsl:
    long_name: "Pressure reduced to mean sea level"
    units: "Pa"
    grib2_key: ":PRMSL:mean sea level:"
    level: "mean sea level"

  tcdc_atm:
    long_name: "Total cloud cover"
    units: "%"
    grib2_key: ":TCDC:entire atmosphere:(?!.*ave)"
    level: "entire atmosphere"

  # GFS-Wave (WW3) variables — separate Herbie model source
  htsgw_sfc:
    long_name: "Significant height of combined wind waves and swell"
    units: "m"
    grib2_key: ":HTSGW:surface:"
    level: "surface"
    herbie_model: "gfs_wave"
    herbie_product: "global.0p25"

  perpw_sfc:
    long_name: "Primary wave mean period"
    units: "s"
    grib2_key: ":PERPW:surface:"
    level: "surface"
    herbie_model: "gfs_wave"
    herbie_product: "global.0p25"

  dirpw_sfc:
    long_name: "Primary wave direction"
    units: "degree"
    grib2_key: ":DIRPW:surface:"
    level: "surface"
    herbie_model: "gfs_wave"
    herbie_product: "global.0p25"

layers:
  temperature:
    display_name: "Temperature at 2m"
    variable: tmp_2m
    units: "K"
    palette: temperature
    value_range: [220.0, 330.0]

  wind_speed:
    display_name: "Wind Speed at 10m"
    units: "m/s"
    palette: wind_speed
    value_range: [0.0, 50.0]
    derived:
      method: magnitude
      sources: [ugrd_10m, vgrd_10m]

  precipitation:
    display_name: "Total Precipitation"
    variable: apcp_sfc
    units: "kg/m^2"
    palette: precipitation
    value_range: [0.0, 250.0]

  pressure:
    display_name: "Mean Sea Level Pressure"
    variable: prmsl
    units: "Pa"
    palette: pressure
    value_range: [92000.0, 106000.0]

  cloud_cover:
    display_name: "Total Cloud Cover"
    variable: tcdc_atm
    units: "%"
    palette: cloud_cover
    value_range: [0.0, 100.0]

  wave_height:
    display_name: "Significant Wave Height"
    variable: htsgw_sfc
    units: "m"
    palette: wave_height
    value_range: [0.0, 15.0]

  wave_period:
    display_name: "Peak Wave Period"
    variable: perpw_sfc
    units: "s"
    palette: wave_period
    value_range: [0.0, 25.0]

  wave_direction:
    display_name: "Mean Wave Direction"
    variable: dirpw_sfc
    units: "degree"
    palette: wave_direction
    value_range: [0.0, 360.0]
